<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administración Billetera W</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0f766e;
            --primary-light: #14b8a6;
            --primary-dark: #0d9488;
            --accent: #f59e0b;
            --surface: #0f172a;
            --surface-card: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f766e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text);
            overflow: visible;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(20, 184, 166, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse 60% 40% at 100% 100%, rgba(245, 158, 11, 0.08) 0%, transparent 50%);
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 2rem;
            max-width: 560px;
        }

        .logo {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, var(--primary-light) 0%, var(--primary) 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            font-size: 2rem;
            font-weight: 700;
            color: white;
            box-shadow: 0 20px 40px rgba(15, 118, 110, 0.3);
            letter-spacing: -1px;
        }

        h1 {
            font-size: 2.25rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #f8fafc 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1rem;
            font-weight: 500;
            margin-bottom: 2.5rem;
        }

        .btn-recargas {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            width: 100%;
            max-width: 320px;
            padding: 1.25rem 2rem;
            font-size: 1.125rem;
            font-weight: 600;
            font-family: inherit;
            color: white;
            background: linear-gradient(135deg, rgba(66,133,244,1) 20%, rgba(53,198,185,1) 50%, rgba(139,212,78,1) 100%);
            border: none;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 30px rgba(15, 118, 110, 0.35);
        }

        .btn-recargas:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 40px rgba(15, 118, 110, 0.45);
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
        }

        .btn-recargas:active {
            transform: translateY(0);
        }

        .btn-recargas svg {
            width: 24px;
            height: 24px;
        }

        .qr-section {
            margin-top: 3rem;
            width: 100%;
        }

        .qr-section h2 {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 1.25rem;
        }

        .qr-frame {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 1.25rem;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15), 0 0 0 1px rgba(255, 255, 255, 0.1);
        }

        .qr-frame img,
        .qr-frame canvas {
            display: block;
            border-radius: 4px;
        }

        .qr-section .qr-hint {
            margin-top: 1rem;
            font-size: 0.875rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        @media (min-width: 640px) {
            h1 {
                font-size: 2.75rem;
            }
            .btn-recargas {
                padding: 1.5rem 2.5rem;
                font-size: 1.25rem;
            }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" width=></script>
</head>
<body>
    <div class="container">
        <div class="logo">
    <img src="imagenes/Logo_blanco.png" width="150dp"; alt="Logo">
</div>
        <h1>Tu Billetera Nospi</h1>
        <p class="subtitle">Tu centro de control financiero</p>
        <button class="btn-recargas" type="button" onclick="window.location.href='https://checkout.wompi.co/l/test_Xlr99u'">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            Ir a Recargas
        </button>

        <section class="qr-section">
            <h2>Tu QR de Pago</h2>
            <div class="qr-frame">
                <div id="qrcode"></div>
            </div>
            <p class="qr-hint">Escanea para tus regargas</p>
        </section>
    </div>

    <script>
        new QRCode(document.getElementById("qrcode"), "https://checkout.wompi.co/l/test_Xlr99u");
    </script>
</body>
</html>
